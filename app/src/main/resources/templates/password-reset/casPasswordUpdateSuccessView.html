<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>

    <title th:text="#{screen.success.header}">Password Update Success View</title>
    <link href="../../static/css/cas.css" rel="stylesheet" th:remove="tag"/>
</head>
<body>
<main role="main" class="container mt-3 mb-3">
    <div layout:fragment="content" class="cas-mobile:w-full">
        <div class="py-default-2x border-3 border-brand rounded-lg flex flex-row w-[784px]">
            <div class="border-r-2 border-brand flex items-center content-center justify-center p-default-2x">
                <div id="cloudogu-logo" role="img" aria-label="Cloudogu Logo"></div>
            </div>
            <div id="successView" class="p-default px-6 grow">
                <h1 class="desktop:text-desktop-6xl mobile:text-mobile-6xl text-default-text mb-default-2x"
                    th:utext="#{screen.pm.success.header}"
                    data-testid=h2-pwd-change-successful>Password Change Successful</h1>
                <p th:utext="#{screen.pm.success.message}">Your account password is successfully updated.</p>
            </div>
        </div>
    </div>
</main>
</body>

</html>
