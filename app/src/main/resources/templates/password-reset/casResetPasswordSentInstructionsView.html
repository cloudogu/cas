<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>

    <title th:text="#{screen.pm.reset.title}">Reset Password Sent Instructions View</title>
    <link href="../../static/css/cas.css" rel="stylesheet" th:remove="tag"/>
</head>

<body>
<main class="container mt-3 mb-3">
    <div id="content" layout:fragment="content" class="mdc-card card p-4 m-auto w-lg-66">
        <div class="py-default-2x border-3 border-brand rounded-lg flex flex-row w-[784px]">
            <div class="border-r-2 border-brand flex items-center content-center justify-center p-default-2x">
                <div id="cloudogu-logo" role="img" aria-label="Cloudogu Logo"></div>
            </div>
            <div id="successView" class="p-default px-6 grow gap-default-2x flex flex-col">
                <h1
                        th:utext="#{screen.pm.reset.sent}"
                        class="desktop:text-desktop-4xl mobile:text-mobile-4xl text-default-text mb-default-2x"
                >
                    Password Reset Instructions Sent Successfully.
                </h1>
                <p th:utext="#{screen.pm.reset.sentInstructions}">You should shortly receive an email with
                    follow-instructions to reset your password. Please do not take long as the password reset
                    instructions
                    may expire.
                </p>
            </div>
        </div>
    </div>
</main>
</body>

</html>
