<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>

    <title th:text="#{screen.logout.header}">CAS Logout</title>
    <link href="../../static/css/cas.css" rel="stylesheet" th:remove="tag"/>
</head>

<body class="">
<main role="main" class="container mt-3 mb-3">
    <div layout:fragment="content" class="justify-content-center d-flex">
        <div class="py-default-2x border-3 border-brand rounded-lg flex flex-row w-[784px]">
            <div class="border-r-2 border-brand flex items-center content-center justify-center p-default-2x">
                <div id="cloudogu-logo" role="img" aria-label="Cloudogu Logo"></div>
            </div>
            <div id="successView" class="p-default px-6">
                <h1
                        class="desktop:text-desktop-6xl mobile:text-mobile-6xl text-default-text mb-default-2x"
                        th:utext="#{screen.logout.header}"
                        th:attr="data-testid=logout-header">
                    Logout successful
                </h1>

                <p class="banner-message focus-href" th:utext="#{screen.logout.success_customized}"
                   th:attr="data-testid=logout-message">You have successfully logged out of the Central Authentication
                    Service. You may <a href="login" class="text-brand ces-focused">log in</a> again.</p>

                <p class="banner-message" th:utext="#{screen.logout.security}"
                   th:attr="data-testid=logout-security-message">For security reasons, exit your web browser.</p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
