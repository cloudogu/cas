<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
    <head>
        <meta charset="UTF-8"/>
        <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>

        <title layout:title-pattern="$LAYOUT_TITLE $CONTENT_TITLE"
               th:text="${#strings.defaultString(#themes.code('cas.theme.name'), 'CAS - Central Authentication Service')}"/>
        </title>

        <!--/* Core CAS CSS */-->
        <link rel="stylesheet" type="text/css" href="../static/css/normalize.css" th:href="@{#{webjars.normalize.css}}"/>
        <link rel="stylesheet" type="text/css" href="../static/css/bootstrap-grid.min.css"
              th:href="@{#{webjars.bootstrap-grid.css}}"/>
        <link rel="stylesheet" type="text/css" href="../static/css/cloudogu-cas.css"
              th:href="@{${#themes.code('cas.standard.css.file')}}"/>
        <link rel="stylesheet" type="text/css" href="../static/css/ces-theme-tailwind.css"
              th:href="@{${#themes.code('cas.theme.css.file')}}"/>

        <!--/* Favicons */-->
        <link rel="shortcut icon" href="../static/img/favicon.ico"/>
        <link rel="icon" type="image/png" sizes="32x32" href="../static/img/favicon-32px.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="../static/img/favicon-16px.png" />
        <meta name="msapplication-TileColor" content="#00aba9">
        <meta name="theme-color" content="#ffffff">
    </head>

    <body>
        <script th:replace="~{fragments/scripts}"></script>

        <div class="mdc-drawer-scrim"></div>

        <div>
            <main role="main" class="main">
                <div layout:fragment="content" id="content">
                    CAS content will go here
                </div>
            </main>
        </div>

        <div th:replace="~{fragments/footer :: footer}">
            <a href="fragments/footer.html">Footer</a> fragment will go here
        </div>
    </body>
</html>
