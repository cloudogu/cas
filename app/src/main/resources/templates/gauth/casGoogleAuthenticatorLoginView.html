<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>

    <title>Eingabe zweiter Faktor</title>
    <link href="../../static/css/cas.css" rel="stylesheet" th:remove="tag"/>
</head>

<body>
<main class="container mt-3 mb-3">
    <div layout:fragment="content" id="login" class="mdc-card card mdc-card-content w-lg-50 p-4 m-auto">
        <h1>Eingabe zweiter Faktor</h1>
        <p th:utext="#{screen.authentication.gauth.selecteddevice(${registeredDevice.name})}"></p>

        <form method="post" id="fm1" th:object="${credential}" th:action="@{/login}">
            <div id="msg" class="banner banner-danger alert alert-danger my-2" th:if="${#fields.hasErrors('*')}">
                <span th:each="err : ${#fields.errors('*')}" th:utext="${err + ' '}"/>
            </div>
            <input type="hidden" name="_eventId" value="submit"/>
            <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
            <input type="hidden" name="geolocation"/>
            <section class="cas-field form-group my-3 mdc-input-group">
                <div class="d-flex">
                    <div class="w-100 mdc-input-group-field mdc-input-group-field-append">
                        <div class="d-flex">
                            <input type="hidden" id="accountId" name="accountId" size="25" autocomplete="off"
                                   th:field="*{accountId}"/>

                            <label for="token"
                                   class="bg-old-background desktop:text-desktop-regular mobile:text-mobile-regular text-neutral flex flex-col">
                                <span class="mdc-notched-outline">
                                    <span class="mdc-notched-outline__leading"></span>
                                    <span class="mdc-notched-outline__notch">
                                        <span class="mdc-floating-label" th:utext="#{cas.mfa.googleauth.label.token}">Token</span>
                                    </span>
                                    <span class="mdc-notched-outline__trailing"></span>
                                </span>
                                <input id="totp-token-input"
                                       data-testid="login-totp-token-input-field"
                                       size="25"
                                       type="password"
                                       th:field="*{token}"
                                       autocapitalize="none"
                                       spellcheck="false"
                                       class="w-full block rounded outline-none p-1.5 focus-visible:p-1 hover:p-1 active:p-1 disabled:p-1.5 border focus-visible:border-3 hover:border-3 active:border-3 disabled:border disabled:text-neutral focus-visible:ces-focused bg-old-background desktop:text-desktop-regular mobile:text-mobile-regular border-neutral hover:border-neutral-strong focus:border-brand active:border-brand disabled:border-neutral disabled:bg-neutral-weak text-default-text"
                                       required
                                />
                            </label>

                            <script type="text/javascript" th:inline="javascript">
                                /*<![CDATA[*/
                                let accountId = /*[[${registeredDevice.id}]]*/;
                                document.getElementById("accountId").value = accountId;
                                /*]]>*/
                            </script>
                        </div>

                        <section id="passwordRevealSection">
                            <label class="bg-old-background desktop:text-desktop-regular mobile:text-mobile-regular text-neutral flex flex-row gap-2 mt-2">
                                <button type="button" role="checkbox" data-state="unchecked"
                                        value="on"
                                        data-testid="password-reveal-checkbox"
                                        id="password-reveal-checkbox" aria-controls="password"
                                        class="border rounded-sm outline-none focus-visible:ces-focused data-[state=checked]:bg-brand data-[state=checked]:border-brand data-[state=checked]:hover:bg-brand-strong data-[state=checked]:hover:border-brand-strong data-[state=checked]:focus-visible:bg-brand-strong data-[state=checked]:focus-visible:border-brand-strong data-[state=checked]:disabled:bg-neutral-weak data-[state=checked]:disabled:border-neutral data-[state=indeterminate]:bg-brand data-[state=indeterminate]:border-brand data-[state=indeterminate]:hover:bg-brand-strong data-[state=indeterminate]:hover:border-brand-strong data-[state=indeterminate]:focus-visible:bg-brand-strong data-[state=indeterminate]:focus-visible:border-brand-strong data-[state=indeterminate]:disabled:bg-neutral-weak data-[state=indeterminate]:disabled:border-neutral data-[state=unchecked]:border-neutral data-[state=unchecked]:bg-default-background data-[state=unchecked]:hover:border-2 data-[state=unchecked]:hover:border-neutral-strong data-[state=unchecked]:focus-visible:border-2 data-[state=unchecked]:focus-visible:border-neutral-strong data-[state=unchecked]:disabled:bg-neutral-weak data-[state=unchecked]:disabled:border-neutral data-[state=unchecked]:disabled:border min-w-[24px] w-[24px] min-h-[24px] h-[24px] flex items-center justify-center">
                                <span data-state="checked" style="pointer-events: none;" id="reveal-checkbox">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                                         viewBox="0 0 256 256" class="text-inverted-text">
                                        <path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z">
                                        </path>
                                    </svg>
                                </span>
                                </button>
                                <span>Token-Eingabe anzeigen</span>
                            </label>

                            <script>
                                document.getElementById("password-reveal-checkbox").onclick = () => {
                                    const checkbox = document.getElementById("password-reveal-checkbox");
                                    const span = document.getElementById("reveal-checkbox");
                                    const pwInput = document.getElementById("totp-token-input");
                                    if (pwInput.type === "password") {
                                        pwInput.type = "text";
                                        checkbox.setAttribute('data-state', 'checked');
                                        if (!span) {
                                            const newSpan = document.createElement('span');
                                            newSpan.id = "reveal-checkbox";
                                            newSpan.style.pointerEvents = 'none';
                                            newSpan.setAttribute('data-state', 'checked');
                                            newSpan.innerHTML = `
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 256 256" class="text-inverted-text">
                                                <path d="M232.49,80.49l-128,128a12,12,0,0,1-17,0l-56-56a12,12,0,1,1,17-17L96,183,215.51,63.51a12,12,0,0,1,17,17Z">
                                                </path>
                                            </svg>`;
                                            checkbox.appendChild(newSpan);
                                        }
                                    } else {
                                        pwInput.type = "password";
                                        checkbox.setAttribute('data-state', 'unchecked');
                                        if (span) {
                                            span.parentNode.removeChild(span);
                                        }
                                    }
                                };
                            </script>
                        </section>
                    </div>
                    <div class="mdc-text-field-helper-line caps-warn" style="display: none;" id="tokenCapsWarn">
                        <p
                                class="mdc-text-field-helper-text form-text text-small mdc-text-field-helper-text--persistent mdc-text-field-helper-text--validation-msg text-danger">
                            <span th:utext="#{screen.capslock.on}"/>
                        </p>
                    </div>
                </div>
            </section>
            <div data-testid=login-form-totp-login-button-container>
                <div th:replace="~{fragments/submitbutton :: submitButton (messageKey='screen.welcome.button.login')}"/>
                <button
                        id="cancel"
                        th:utext="#{screen.authentication.gauth.cancel}"
                        class="focus-visible:ces-focused whitespace-nowrap px-[14px] font-bold h-10 desktop:text-desktop-regular mobile:text-mobile-regular bg-transparent hover:bg-neutral-weak focus-visible:bg-neutral-weak active:bg-neutral-weak disabled:bg-transparent aria-disabled:bg-transparent rounded border-2 border-transparent active:border-neutral-stronger disabled:border-transparent aria-disabled:border-transparent text-neutral hover:text-neutral-strong focus-visible:text-neutral-strong active:text-neutral-stronger disabled:text-neutral-weak aria-disabled:text-neutral-weak outline-0"
                        onclick="location.href = location.href;"
                        data-testid="cancel-totp"/>
            </div>
        </form>
        <script type="text/javascript" th:inline="javascript">
            (function() {
                'use strict';

                function initCapsLockDetection() {
                    const capsWarnDiv = document.getElementById('tokenCapsWarn');

                    if (!capsWarnDiv) {
                        return;
                    }

                    function checkCapsLock(event) {
                        try {
                            const isCapsLockOn = event.getModifierState && event.getModifierState('CapsLock');
                            capsWarnDiv.style.display = isCapsLockOn ? 'block' : 'none';
                        } catch (e) {
                            console.error('Error checking caps lock', e);
                        }
                    }

                    document.addEventListener('keydown', checkCapsLock);
                    document.addEventListener('keyup', checkCapsLock);
                }

                // Initialize when DOM is ready
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', initCapsLockDetection);
                } else {
                    initCapsLockDetection();
                }
            })();
        </script>
        <span th:if="${registeredDevices}">
            <p>
            <hr width="75%">
            <p th:utext="#{screen.authentication.gauth.selanotherdevice(${registeredDevice.name})}"></p>
            <form method="post" id="fm3">
                <input type="hidden" name="_eventId" value="select"/>
                <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>
                <button
                        id="selectDeviceButton"
                        accesskey="s"
                        th:text="#{screen.authentication.gauth.selectdevice}"
                        class="mt-default-2x text-brand underline decoration-brand decoration-dashed decoration-1 hover:decoration-solid active:decoration-2 active:decoration-solid focus-visible:ces-focused focus-visible:outline-none focus-visible:text-default-text focus-visible:no-underline"
                        onclick="location.href = location.href;"
                        data-testid="cancel-totp"/>
            </form>
        </span>

        <div id="deviceRegistrationDiv"
             th:if="${gauthMultipleDeviceRegistrationEnabled && #bools.isTrue(#objects.nullSafe(mfaDeviceRegistrationEnabled, true))}">
            <p>
            <hr width="75%">
            <p th:utext="#{screen.authentication.gauth.reganotherdevice}"></p>
            <button class="mdc-button mdc-button--raised btn btn-primary me-2"
                    onclick="cas.openDialog('confirm-reg-dialog')"
                    name="registerButton" id="registerButton">
                <span class="mdc-button__label" th:text="#{screen.welcome.button.register}">Register</span>
            </button>

            <!-- Confirmation Dialog -->
            <div class="mdc-dialog" id="confirm-reg-dialog" role="alertdialog"
                 aria-modal="true" aria-labelledby="notif-dialog-title" aria-describedby="notif-dialog-content">
                <form method="post" id="regform" class="fm-v clearfix">
                    <div class="mdc-dialog__container">
                        <div class="mdc-dialog__surface">
                            <h1 class="mdc-dialog__title mt-lg-2" id="notif-dialog-title"
                                th:utext="#{screen.authentication.gauth.confirm.title}">
                                Confirm Account Registration
                            </h1>
                            <div class="mdc-dialog__content" id="notif-dialog-content">
                                <div class="mdc-typography--body1">
                                    <div class="banner banner-danger alert alert-danger banner-dismissible"
                                         role="alert" style="display: none" id="errorPanel">
                                        <h3>Failure</h3>
                                        <p th:utext="#{screen.authentication.gauth.invalidtoken}">
                                    </div>

                                    <p class="text-justify" th:utext="#{screen.authentication.gauth.confirm.desc}">
                                        Description</p>

                                    <input type="hidden" name="_eventId" value="confirm"/>
                                    <input type="hidden" name="execution" th:value="${flowExecutionKey}"/>

                                    <section class="cas-field form-group my-3 mdc-input-group">
                                        <div class="mdc-input-group-field mdc-input-group-field-append">
                                            <div class="d-flex caps-check">
                                                <label for="token"
                                                       class="mdc-text-field mdc-text-field--outlined control-label mdc-text-field--with-trailing-icon">
                                                    <span class="mdc-notched-outline">
                                                        <span class="mdc-notched-outline__leading"></span>
                                                        <span class="mdc-notched-outline__notch">
                                                            <span class="mdc-floating-label"
                                                                  th:utext="#{cas.mfa.googleauth.label.token}">Token</span>

                                                        </span>
                                                        <span class="mdc-notched-outline__trailing"></span>
                                                    </span>
                                                    <input class="mdc-text-field__input form-control pwd"
                                                           type="password"
                                                           name="token"
                                                           id="token"
                                                           size="25"
                                                           aria-required="true"
                                                           autocomplete="off"
                                                           required/>
                                                    <span class="mdc-text-field-helper-line invalid-feedback">
                                                        <span class="mdc-text-field-helper-text mdc-text-field-helper-text--validation-msg"
                                                              aria-hidden="true">
                                                            <span th:utext="#{username.required}"></span>
                                                        </span>
                                                    </span>
                                                </label>
                                                <button class="reveal-password align-self-end mdc-button mdc-button--raised btn btn-primary mdc-input-group-append mdc-icon-button"
                                                        tabindex="-1"
                                                        type="button">
                                                    <i class="mdi mdi-eye fas fa-eye reveal-password-icon"
                                                       aria-hidden="true"></i>
                                                    <span class="visually-hidden">Toggle Token</span>
                                                </button>
                                            </div>

                                            <p/>
                                            <div th:if="${registeredDevices}">
                                                <div class="mdc-select mdc-select--outlined mdc-select--required mdc-menu-surface--fullwidth authn-source">
                                                    <input type="hidden" name="accountId">
                                                    <div class="mdc-select__anchor"
                                                         role="button"
                                                         aria-required="true"
                                                         aria-haspopup="listbox"
                                                         aria-expanded="false">
                                                        <span class="mdc-line__ripple"></span>
                                                        <span class="mdc-notched-outline">
                                                            <span class="mdc-notched-outline__leading"></span>
                                                            <span class="mdc-notched-outline__notch">
                                                                <span id="outlined-select-label"
                                                                      class="mdc-floating-label"
                                                                      th:utext="#{screen.account.mfadevices.title}">Registered Accounts</span>
                                                            </span>
                                                            <span class="mdc-notched-outline__trailing"></span>
                                                        </span>
                                                        <span class="mdc-select__selected-text-container">
                                                            <span class="mdc-select__selected-text"/>
                                                        </span>
                                                        <span class="mdc-select__dropdown-icon">
                                                            <svg class="mdc-select__dropdown-icon-graphic"
                                                                 viewBox="7 10 10 5"
                                                                 focusable="false">
                                                                <polygon class="mdc-select__dropdown-icon-inactive"
                                                                         stroke="none"
                                                                         fill-rule="evenodd" points="7 10 12 15 17 10">
                                                                </polygon>
                                                                <polygon class="mdc-select__dropdown-icon-active"
                                                                         stroke="none"
                                                                         fill-rule="evenodd" points="7 15 12 10 17 15">
                                                                </polygon>
                                                            </svg>
                                                        </span>
                                                        <span class="mdc-line-ripple"></span>
                                                    </div>

                                                    <div class="mdc-select__menu mdc-menu mdc-menu-surface mdc-menu-surface--fullwidth">
                                                        <ul class="mdc-list" role="listbox">
                                                            <li th:each="account,iter : ${registeredDevices}"
                                                                class="mdc-list-item " th:id="${account.id}"
                                                                th:classappend="${iter.index == 0 ? 'mdc-list-item--selected' : ''}"
                                                                th:data-value="${account.id}" role="option">
                                                                <span class="mdc-list-item__ripple"></span>
                                                                <span class="mdc-list-item__text"
                                                                      th:utext="${account.name}">Device</span>
                                                            </li>
                                                        </ul>
                                                    </div>
                                                </div>
                                                <p/><br/>
                                            </div>
                                        </div>
                                    </section>
                                </div>
                            </div>
                            <footer class="mdc-dialog__actions">
                                <button class="mdc-button mdc-button--raised btn btn-primary me-2" name="verifyButton"
                                        id="verifyButton">
                                    <span class="mdc-button__label"
                                          th:text="#{screen.welcome.button.login}">Login</span>
                                </button>
                                <button type="button"
                                        class="mdc-button mdc-button--outline btn btn-outline-secondary button-cancel"
                                        data-mdc-dialog-action="accept" data-mdc-dialog-button-default>
                                    <span class="mdc-button__label">Cancel</span>
                                </button>
                            </footer>
                        </div>
                    </div>
                    <div class="mdc-dialog__scrim"></div>
                </form>

                <script type="text/javascript">
                    let btn = document.getElementById('verifyButton');
                    btn.addEventListener('click', event => {
                        if (document.getElementById("regform").reportValidity()) {
                            let endpoint = $('#regform').attr('action');
                            event.preventDefault();
                            $('#errorPanel').hide();

                            let formData = $("#regform").serializeArray();
                            formData.push({
                                name: "validate",
                                value: true
                            });
                            $.post(endpoint, formData)
                                .done((data, status, jqxhr) => {
                                    $('#errorPanel').hide();
                                    $("#regform").submit();
                                })
                                .fail((data, status, jqxhr) => $("#errorPanel").show("fast", "swing"));
                        }
                    }, false);
                </script>
            </div>
            <!-- Confirmation Dialog -->
        </div>
        </p>
    </div>
</main>
</body>
</html>
