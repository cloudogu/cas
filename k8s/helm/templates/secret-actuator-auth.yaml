{{- if .Values.secrets.actuatorAuth.create }}
{{- $secretName := required "secrets.actuatorAuth.name is required" .Values.secrets.actuatorAuth.name -}}
{{- $usernameKey := default "username" .Values.secrets.actuatorAuth.usernameKey -}}
{{- $passwordKey := default "password" .Values.secrets.actuatorAuth.passwordKey -}}
{{- $existingUsername := include "cas.lookupSecretValue" (dict "root" . "secretName" $secretName "key" $usernameKey) -}}
{{- $existingPassword := include "cas.lookupSecretValue" (dict "root" . "secretName" $secretName "key" $passwordKey) -}}
{{- $username := default (default "actuator" .Values.secrets.actuatorAuth.username) $existingUsername -}}
{{- $password := default (randAlphaNum 40) $existingPassword -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "cas.labels" . | nindent 4 }}
    {{- include "cas.backupLabels" . | nindent 4 }}
type: Opaque
data:
  {{ $usernameKey | quote }}: {{ $username | b64enc | quote }}
  {{ $passwordKey | quote }}: {{ $password | b64enc | quote }}
{{- end }}
