{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    {{ include "cas.labels" . | nindent 4 }}
  name: {{ include "cas.name" . }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          - backend:
              service:
                name: {{ include "cas.name" . }}
                port:
                  number: {{ .Values.service.ports.web.port }}
            path: /cas
            pathType: Prefix
{{- end }}